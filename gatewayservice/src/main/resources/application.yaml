spring:

  application:
    name: swiftpay-gateway

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.add.type.headers: false
        linger.ms: 5
        compression.type: snappy

      batch-size: 16384
      buffer-memory: 33554432
      acks: 1

  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: postgres
    password: postgres

    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: false

management:

  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

server:
  port: 8080

  tomcat:
    threads:
      max: 400
      min-spare: 50

    accept-count: 200

    max-connections: 10000

logging:
  level:
    root: INFO
    com.swiftpay.gatewayservice: INFO