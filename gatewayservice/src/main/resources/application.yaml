spring:

  application:
    name: swiftpay-gateway

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.add.type.headers: false

  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

management:

  endpoints:

    web:

      exposure:

        include: health,info

  endpoint:

    health:

      show-details: always

server:
  port: 8080

logging:
  level:
    root: INFO
    com.swiftpay.gatewayservice: DEBUG